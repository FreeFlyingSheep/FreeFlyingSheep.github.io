- company:
    name: 龙芯中科技术股份有限公司
    url: "https://www.loongson.cn"
    location: 江苏苏州
    logo: /images/sections/experiences/loongson.jpg
    # Can optionally show a different logo for dark theme
    # darkLogo: /images/sections/experiences/company2.jpg
    overview: 龙芯中科技术股份有限公司是一家设计通用处理器的公司，主要以龙芯处理器而闻名。
  positions:
  - designation: Software Engineer
    start: Dec 2020
    end: Aug 2023
    responsibilities:
    - 参与 Linux 内核开发，面向 MIPS/LoongArch 提交上游补丁，修复缺陷并提升稳定性与兼容性。
    - 建设 LoongArch 软件生态：移植并验证关键底层软件（如 klibc、Valgrind）在 LoongArch64/Linux 上的可用性与兼容性。
    - 维护团队 GitHub 仓库与 CI/CD 流程，提升构建/发布可靠性与开发效率。

