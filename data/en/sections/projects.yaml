- name: RT-Thread for LoongArch
  role: Developer
  repo: https://github.com/FreeFlyingSheep/rt-thread
  summary: RT-Thread with LoongArch support. RT-Thread is an open source IoT Real-Time Operating System (RTOS).
  tags: ["rtthread","loongarch","professional"]

- name: Kcov
  role: Contributor
  repo: https://github.com/SimonKagstrom/kcov
  summary: Code coverage tool for compiled programs, Python and Bash which uses debugging information to collect and report data without special compilation options.
  tags: ["kcov","loongarch","professional"]

