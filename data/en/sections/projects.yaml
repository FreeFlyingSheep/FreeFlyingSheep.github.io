  tags: ["linux","professional"]

- name: Valgrind for LoongArch64/Linux
  role: Developer
  repo: https://github.com/FreeFlyingSheep/valgrind-loongarch64
  summary: Valgrind with support for the LoongArch64/Linux platform. Valgrind is an instrumentation framework for building dynamic analysis tools.
  tags: ["valgrind","linux","loongarch","professional"]

- name: klibc
  role: Contributor
  repo: https://web.git.kernel.org/pub/scm/libs/klibc/klibc.git/
  summary: klibc is a minimalistic subset of the standard C library.
